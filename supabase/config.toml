# Supabase CLI configuration for the Open Floor project.
project_id = "open-floor"

[db.seed]
# Automatic seeding is disabled: nothing in supabase/seed/ runs on `db reset`.
# - supabase/seed/20260715000001_company_directory_bootstrap.sql is the
#   company-directory bootstrap (real reference data, NOT fake community data),
#   regenerated by `npm run bootstrap:generate`. Apply it deliberately when
#   ready — and BEFORE the retail-popularity seed — e.g. by enabling this
#   section with:
#     enabled = true
#     sql_paths = ["./seed/20260715000001_company_directory_bootstrap.sql"]
# - supabase/seed/20260715000002_retail_popularity.sql is the "Popular with
#   Retail Investors" seed. It resolves companies by (ticker, exchange), so it
#   MUST be applied AFTER the company bootstrap above, or its rows silently
#   insert nothing. Apply it as an admin/service role.
# - supabase/seed/202607100002_seed_fictional_companies.sql is fictional demo
#   data and must never be listed in sql_paths for shared environments.
enabled = false

# Edge Functions. Each function does its own authorization (internal shared secret,
# admin-JWT verification, or webhook signature), so JWT verification at the gateway
# is disabled — anonymous visitors and Resend must be able to reach them.
[functions.login]
verify_jwt = false

[functions.submit-intake]
verify_jwt = false

[functions.send-transactional-email]
verify_jwt = false

[functions.resend-webhook]
verify_jwt = false
