# Supabase CLI configuration for the GroundFloor project.
project_id = "groundfloor"

[db.seed]
# Automatic seeding is disabled: nothing in supabase/seed/ runs on `db reset`.
# - supabase/seed/20260710000001_company_directory_bootstrap.sql is the
#   company-directory bootstrap (real reference data, NOT fake community data).
#   Apply it deliberately when ready, e.g. by enabling this section with:
#     enabled = true
#     sql_paths = ["./seed/20260710000001_company_directory_bootstrap.sql"]
# - supabase/seed/202607100002_seed_fictional_companies.sql is fictional demo
#   data and must never be listed in sql_paths for shared environments.
enabled = false
